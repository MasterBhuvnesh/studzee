services:
  backend:
    image: verma2904/studzee-backend:latest
    container_name: backend
    restart: always
    env_file:
      - ./env.backend
    networks:
      - web

  notification:
    image: verma2904/studzee-notification:latest
    container_name: notification
    restart: always
    env_file:
      - ./env.notification
    networks:
      - web

  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - backend
      - notification

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
