apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: studzee
# Local dev stack: the app services from base plus in-cluster infra. On EKS this
# overlay is swapped for one that points at RDS, ElastiCache and AmazonMQ.
resources:
  - ../../base
  - postgres.yaml
  - redis.yaml
  - rabbitmq.yaml
